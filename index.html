<!doctype html>
<html lang="vi" ng-app="pvoilApp">
  <head>
    <meta charset="utf-8" />
    <title>PVOIL Office - Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body ng-controller="LoginController as vm">
    <div class="login-page">
      <div class="login-hero">
        <div class="hero-logo-card">
          <img
            src="assets/Container.svg"
            alt="PVOIL logo"
            class="hero-logo"
          />
        </div>
        <div class="hero-heading">
          <h1>
            Năng lượng cho
            <span>Kỷ nguyên số</span>
          </h1>
        </div>
        <p class="hero-description">
          Hệ thống quản trị văn phòng điện tử thông minh, tối ưu hóa quy trình
          nghiệp vụ cho đội ngũ nhân sự PVOIL trên toàn quốc.
        </p>
        <div class="hero-actions">
          <button type="button" class="chip chip-primary">
            <img
              src="assets/Icon-5.svg"
              alt=""
              class="chip-icon"
            />
            <span>Truy cập an toàn</span>
          </button>
          <button type="button" class="chip chip-secondary">
            <img
              src="assets/Icon-4.svg"
              alt=""
              class="chip-icon"
            />
            <span>Hiệu suất cao</span>
          </button>
        </div>
      </div>

      <main class="login-card" role="main" aria-label="Đăng nhập">
        <header class="login-card-header">
          <h2>Đăng nhập</h2>
          <p>Nhập email và mật khẩu để đăng nhập!</p>
        </header>

        <form class="login-form" novalidate ng-submit="vm.submit()">
          <div class="form-field">
            <label for="username">Tên đăng nhập</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <img src="assets/Icon-2.svg" alt="" />
              </span>
              <input
                id="username"
                name="username"
                type="email"
                placeholder="phuongdt1@pvoil.com.vn"
                ng-model="vm.credentials.username"
                autocomplete="username"
                required
              />
            </div>
          </div>

          <div class="form-field">
            <label for="password">Mật khẩu</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <img src="assets/Icon-1.svg" alt="" />
              </span>
              <input
                id="password"
                name="password"
                ng-attr-type="{{ vm.showPassword ? 'text' : 'password' }}"
                placeholder="••••••••"
                ng-model="vm.credentials.password"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="input-trailing-icon"
                ng-click="vm.togglePassword()"
                aria-label="{{ vm.showPassword ? 'Ẩn mật khẩu' : 'Hiển thị mật khẩu' }}"
              >
                <img src="assets/Icon-3.svg" alt="" />
              </button>
            </div>
          </div>

          <div class="form-meta">
            <label class="checkbox">
              <input
                type="checkbox"
                ng-model="vm.remember"
              />
              <span>Ghi nhớ đăng nhập</span>
            </label>
            <a href="" class="link-muted">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-primary">
            Đăng nhập
          </button>

          <div class="divider">
            <span>Hoặc đăng nhập bằng</span>
          </div>

          <button type="button" class="btn-ghost">
            <img
              src="assets/Icon.svg"
              alt=""
              class="btn-qr-icon"
            />
            <span>Đăng nhập bằng mã QR</span>
          </button>
        </form>

        <footer class="login-footer">
          <p>© 2026 bản quyền thuộc PVOIL</p>
        </footer>
      </main>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
